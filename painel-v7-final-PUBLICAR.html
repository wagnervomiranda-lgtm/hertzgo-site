<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HertzGo — Painel da Rede</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #05101a; color: #e8f0f5; padding: 14px; min-height: 100vh; position: relative; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle at 20% 20%, rgba(181,240,42,0.08) 0%, transparent 40%), radial-gradient(circle at 80% 80%, rgba(1,96,112,0.20) 0%, transparent 50%), radial-gradient(circle at 60% 30%, rgba(0,200,255,0.05) 0%, transparent 40%); pointer-events: none; z-index: 0; animation: glow 18s ease-in-out infinite alternate; }
  @keyframes glow { 0% { opacity: 0.8; transform: scale(1); } 100% { opacity: 1; transform: scale(1.05); } }
  .container { max-width: 1180px; margin: 0 auto; position: relative; z-index: 1; }
  .preview-banner { background: linear-gradient(135deg, rgba(240,192,64,0.2), rgba(240,192,64,0.05)); border: 1px dashed #f0c040; border-radius: 10px; padding: 10px 14px; margin-bottom: 14px; font-size: 12px; color: #ffe9b8; }
  .preview-banner strong { color: #fff; }
  .header { display: flex; flex-direction: column; gap: 12px; margin-bottom: 18px; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .logo-mark { display: inline-flex; align-items: center; padding: 6px 10px; border-radius: 9px; background: #000; border: 1px solid rgba(111,230,245,0.25); transition: box-shadow 0.4s; }
  .logo-img { display:block; height: 28px; width: auto; }
  /* Pulsação — 3 intensidades */
  .logo-mark.pulse-medio  { animation: pulseMedio 2.6s ease-in-out infinite; }
  @keyframes pulseMedio { 0%,100% { box-shadow: 0 0 16px rgba(111,230,245,0.30); } 50% { box-shadow: 0 0 36px rgba(111,230,245,0.65); transform: scale(1.02); } }
  .title-block { flex: 1; }
  .title-main { font-size: 16px; font-weight: 700; color: #fff; }
  .subtitle { color: #8a9ba8; font-size: 11px; font-weight: 500; letter-spacing: 0.4px; text-transform: uppercase; }
  .meta-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .period-chip { display: inline-flex; align-items: center; gap: 8px; background: rgba(1,96,112,0.25); border: 1px solid rgba(181,240,42,0.3); padding: 6px 12px; border-radius: 999px; font-size: 12px; }
  .period-chip .dot { width: 7px; height: 7px; background: #b5f02a; border-radius: 50%; animation: pulse 2s infinite; box-shadow: 0 0 8px #b5f02a; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .tabs { display: flex; gap: 4px; background: rgba(13,27,42,0.6); padding: 3px; border-radius: 10px; border: 1px solid rgba(138,155,168,0.15); }
  .tab { padding: 6px 14px; border-radius: 7px; font-size: 12px; font-weight: 600; color: #8a9ba8; cursor: pointer; border: none; background: transparent; transition: all 0.2s; }
  .tab.active { background: linear-gradient(135deg, #016070, #023a44); color: #e8f0f5; box-shadow: 0 2px 12px rgba(1,96,112,0.4); }
  .alerts { margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; }
  .alert { display: flex; gap: 10px; align-items: flex-start; border-radius: 10px; padding: 12px 14px; font-size: 13px; border-left: 3px solid; line-height: 1.45; }
  .alert.crit { background: linear-gradient(135deg, rgba(255,68,68,0.18), rgba(255,68,68,0.06)); border-color: #ff5064; color: #ffd4da; }
  .alert.warn { background: linear-gradient(135deg, rgba(240,192,64,0.18), rgba(240,192,64,0.06)); border-color: #f0c040; color: #ffe9b8; }
  .alert.info { background: linear-gradient(135deg, rgba(111,230,245,0.14), rgba(111,230,245,0.04)); border-color: #6fe6f5; color: #c5eff5; }
  .alert strong { color: #fff; font-weight: 700; }

  /* SECTION HEADER (label dos blocos Mês / Hoje) */
  .section-label { display: flex; align-items: center; gap: 10px; margin: 18px 0 8px 0; }
  .section-label .lbl { font-size: 11px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; padding: 4px 10px; border-radius: 6px; }
  .section-label .lbl.mes { background: rgba(181,240,42,0.15); color: #c5ff50; border: 1px solid rgba(181,240,42,0.4); }
  .section-label .lbl.hoje { background: rgba(111,230,245,0.15); color: #6fe6f5; border: 1px solid rgba(111,230,245,0.4); }
  .section-label .ctx { font-size: 11px; color: #8a9ba8; }

  /* KPI grids — MES */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .kpi { background: linear-gradient(135deg, rgba(13,27,42,0.9), rgba(9,25,41,0.95)); border: 1px solid rgba(138,155,168,0.12); border-radius: 14px; padding: 14px; position: relative; overflow: hidden; }
  .kpi.mes::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #b5f02a, #c5ff50); }
  .kpi.hoje::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #6fe6f5, #00c8ff); }
  .kpi-label { font-size: 10px; color: #8a9ba8; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
  .kpi-value { font-size: 22px; font-weight: 800; color: #fff; margin-top: 6px; line-height: 1; font-variant-numeric: tabular-nums; }
  .kpi-unit { font-size: 12px; color: #8a9ba8; margin-left: 4px; }
  .kpi-sub { font-size: 11px; color: #8a9ba8; margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
  .arrow-pill { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 999px; font-size: 11px; font-weight: 700; }
  .arrow-pill.up { background: rgba(181,240,42,0.18); color: #c5ff50; border: 1px solid rgba(181,240,42,0.3); }
  .arrow-pill.down { background: rgba(255,80,100,0.15); color: #ff8b9f; border: 1px solid rgba(255,80,100,0.3); }
  .arrow-pill.neutral { background: rgba(111,230,245,0.15); color: #6fe6f5; border: 1px solid rgba(111,230,245,0.3); }

  .card { background: linear-gradient(135deg, rgba(13,27,42,0.75), rgba(9,25,41,0.9)); border: 1px solid rgba(138,155,168,0.12); border-radius: 14px; padding: 16px; margin-bottom: 14px; backdrop-filter: blur(10px); }
  .card h2 { margin: 0 0 14px 0; font-size: 12px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 0.8px; display: flex; align-items: center; gap: 8px; }
  .card h2::before { content: ''; width: 3px; height: 12px; background: linear-gradient(180deg, #b5f02a, #6fe6f5); border-radius: 2px; }
  .card.hoje-tag h2::before { background: linear-gradient(180deg, #6fe6f5, #00c8ff); }
  .card-sub { font-size: 11px; color: #8a9ba8; margin-top: -8px; margin-bottom: 12px; }

  .table-wrap { overflow-x: auto; margin: 0 -4px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 540px; }
  th { text-align: left; padding: 8px 6px; font-weight: 700; color: #8a9ba8; border-bottom: 1px solid rgba(138,155,168,0.2); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  td { padding: 10px 6px; border-bottom: 1px solid rgba(138,155,168,0.08); color: #e8f0f5; }
  td.right, th.right { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .bar { display: inline-block; height: 4px; background: linear-gradient(90deg, #016070, #6fe6f5); border-radius: 2px; margin-right: 6px; vertical-align: middle; }
  .bar.hoje { background: linear-gradient(90deg, #6fe6f5, #00c8ff); }
  .plat { display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 999px; font-weight: 700; }
  .plat.spott { background: rgba(111,230,245,0.12); color: #6fe6f5; border: 1px solid rgba(111,230,245,0.3); }
  .plat.move { background: rgba(240,192,64,0.12); color: #f0c040; border: 1px solid rgba(240,192,64,0.3); }
  .status-tag { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 999px; font-weight: 700; }
  .status-tag.online { background: rgba(181,240,42,0.18); color: #c5ff50; }
  .status-tag.idle { background: rgba(240,192,64,0.18); color: #f0c040; }
  .status-tag.offline { background: rgba(255,80,100,0.18); color: #ff8b9f; }

  .split-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .split-item { padding: 10px 14px; border-left: 2px solid rgba(181,240,42,0.5); background: rgba(5,16,26,0.3); border-radius: 0 8px 8px 0; }
  .split-item .label { font-size: 10px; color: #8a9ba8; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
  .split-item .value { font-size: 18px; font-weight: 800; color: #fff; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .split-item .sub { font-size: 11px; color: #8a9ba8; margin-top: 2px; }

  .courtesy-item { background: rgba(5,16,26,0.3); border-radius: 8px; overflow: hidden; margin-top: 10px; border: 1px solid rgba(138,155,168,0.12); }
  .courtesy-head { padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between; user-select: none; }
  .courtesy-head .arrow { font-size: 14px; color: #8a9ba8; font-weight: bold; transition: transform 0.3s; }
  .courtesy-item.open .courtesy-head .arrow { transform: rotate(90deg); }
  .courtesy-body { max-height: 0; overflow: hidden; transition: max-height 0.3s; }
  .courtesy-item.open .courtesy-body { max-height: 600px; }
  .courtesy-list { padding: 0 14px 12px 14px; font-size: 12px; }
  .courtesy-list table { min-width: 0; }
  .courtesy-list th { font-size: 10px; }

  .heatmap { display: grid; grid-template-columns: repeat(24, 1fr); gap: 3px; margin-top: 8px; }
  .heat-cell { aspect-ratio: 1; border-radius: 3px; }
  .heat-axis { display: grid; grid-template-columns: repeat(24, 1fr); gap: 3px; font-size: 8px; color: #566977; margin-top: 4px; text-align: center; }
  .peak-insight { background: rgba(111,230,245,0.06); border: 1px solid rgba(111,230,245,0.2); border-radius: 8px; padding: 10px 14px; margin-top: 12px; font-size: 12px; color: #c5eff5; line-height: 1.5; }
  .peak-insight strong { color: #fff; }
  .peak-insight .insight-row { padding: 4px 0; border-top: 1px solid rgba(111,230,245,0.1); }
  .peak-insight .insight-row:first-child { border-top: none; }
  .peak-insight .ai-tag { display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 999px; background: rgba(111,230,245,0.2); color: #6fe6f5; font-weight: 700; margin-right: 6px; }

  .chart-container { position: relative; height: 280px; }
  .chart-legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; font-size: 11px; color: #8a9ba8; align-items: center; }
  .chart-legend .item { display: inline-flex; align-items: center; gap: 5px; }
  .chart-legend .sw { width: 10px; height: 10px; border-radius: 2px; }
  .chart-legend .ln { width: 18px; height: 2px; }

  .health-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .charger { background: rgba(5,16,26,0.6); border: 1px solid rgba(138,155,168,0.15); border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; gap: 12px; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.online { background: #b5f02a; box-shadow: 0 0 10px rgba(181,240,42,0.7); }
  .status-dot.warn { background: #f0c040; }
  .status-dot.crit { background: #ff5064; }
  .charger-info { flex: 1; min-width: 0; }
  .charger-name { font-size: 12px; font-weight: 600; }
  .charger-meta { font-size: 10px; color: #8a9ba8; margin-top: 2px; }
  .disp-bar { flex-shrink: 0; text-align: right; min-width: 50px; }
  .disp-bar .pct { font-size: 14px; font-weight: 800; color: #fff; }
  .disp-bar .pct.warn { color: #f0c040; }

  .placeholder-tag { display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 999px; font-weight: 700; background: rgba(240,192,64,0.18); color: #f0c040; border: 1px solid rgba(240,192,64,0.3); margin-left: 6px; }

  .footer { text-align: center; color: #566977; font-size: 10px; margin-top: 16px; }

  @media (min-width: 640px) {
    body { padding: 20px; }
    .header { flex-direction: row; justify-content: space-between; align-items: center; }
    .kpi-grid { grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .health-grid { grid-template-columns: repeat(2, 1fr); }
    .split-grid { grid-template-columns: repeat(3, 1fr); }
    .chart-container { height: 340px; }
  }
  @media (min-width: 1024px) { .health-grid { grid-template-columns: repeat(3, 1fr); } }
</style>
</head>

function renderHeatmap(elId, axisId, HOUR) {
  const heatEl = document.getElementById(elId); heatEl.innerHTML = '';
  const max = Math.max(...HOUR);
  HOUR.forEach((c,h) => {
    const cell = document.createElement('div'); cell.className='heat-cell';
    if(max===0){cell.style.background='rgba(138,155,168,0.08)';}
    else{const i=c/max;cell.style.background=i===0?'rgba(138,155,168,0.08)':`rgba(${5+i*175},${16+i*224},${26+i*16},${0.2+i*0.8})`;}
    cell.title = `${String(h).padStart(2,'0')}h — ${c} sess.`;
    heatEl.appendChild(cell);
  });
  const ax = document.getElementById(axisId); ax.innerHTML = '';
  for(let h=0;h<24;h++){const l=document.createElement('div');l.textContent=h%3===0?String(h).padStart(2,'0'):'';ax.appendChild(l);}
}

// ==== ANO
function renderAno() {
  const totalAno = MONTHLY_TOTAL.reduce((a,m)=>a+m.rev,0);
  const dyn = document.getElementById('dynamic');
  dyn.innerHTML = `
    <div class="card" style="background:rgba(240,192,64,0.08);border-color:rgba(240,192,64,0.3);">
      <div style="font-size:13px;color:#ffe9b8;line-height:1.5;">⚠ <strong>Ano · 5 meses (dez/25 a abr/26):</strong> alguns dados são estimativas <span class="placeholder-tag">PLACEHOLDER</span>. A rotina vai preencher quando puxar histórico Move e Spott.</div>
    </div>
    <div class="kpi-grid">
      <div class="kpi mes"><div class="kpi-label">Faturamento Acumulado</div><div class="kpi-value">R$ ${(totalAno/1000).toFixed(1)}k</div><div class="kpi-sub"><span>5 meses · rede</span></div></div>
      <div class="kpi mes"><div class="kpi-label">Melhor Mês</div><div class="kpi-value">Mar/26</div><div class="kpi-sub"><span>R$ 44.200 <span class="placeholder-tag">est.</span></span></div></div>
      <div class="kpi mes"><div class="kpi-label">Crescimento Total</div><div class="kpi-value" style="color:#c5ff50;">+133%</div><div class="kpi-sub"><span>dez/25 → abr/26</span></div></div>
      <div class="kpi mes"><div class="kpi-label">Disp. Média Anual</div><div class="kpi-value">88,9<span class="kpi-unit">%</span></div><div class="kpi-sub"><span>5 meses</span></div></div>
    </div>

    <div class="card">
      <h2>Faturamento Mensal — Por Estação</h2>
      <div class="card-sub">Empilhado por unidade · linha azul = meta mensal R$ 46.410 · cada cor = uma estação</div>
      <div class="chart-container"><canvas id="chartA"></canvas></div>
      <div class="chart-legend" id="legendA"></div>
    </div>

    <div class="card">
      <h2>Crescimento Mês a Mês — Rede</h2>
      <div class="card-sub">Soma das 6 unidades · variação vs mês anterior</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Mês</th><th class="right">Receita Rede</th><th class="right">vs anterior</th></tr></thead>
          <tbody id="tb-mom"></tbody>
        </table>
      </div>
      <div style="font-size:11px;color:#8a9ba8;margin-top:12px;">Crescimento por estação:</div>
      <div class="table-wrap" style="margin-top:6px;">
        <table>
          <thead><tr><th>Unidade</th><th class="right">Dez/25</th><th class="right">Jan/26</th><th class="right">Fev/26</th><th class="right">Mar/26</th><th class="right">Abr/26</th></tr></thead>
          <tbody id="tb-unit-mom"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2>Ranking de Unidades — 5 meses</h2>
      <div class="card-sub" style="color:#f0c040;">Acumulado · valores estimados <span class="placeholder-tag">PLACEHOLDER</span></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Unidade</th><th class="right">Receita Anual</th><th class="right">% da rede</th></tr></thead>
          <tbody id="tb-rank"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2>Disponibilidade Média Mensal</h2>
      <div class="card-sub">Saúde estrutural da rede ao longo do tempo</div>
      <div class="chart-container" style="height:200px;"><canvas id="chartUp"></canvas></div>
    </div>

    <div class="card">
      <h2>Eficiência R$/kWh por Unidade — 5 meses</h2>
      <div class="card-sub" style="color:#f0c040;">Quem cobra caro · quem está abaixo da meta R$ 1,85/kWh — <span class="placeholder-tag">PLACEHOLDER</span></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Unidade</th><th class="right">R$/kWh anual</th><th class="right">vs meta R$ 1,85</th></tr></thead>
          <tbody>
            <tr><td>Costa</td><td class="right">R$ 1,93</td><td class="right"><span class="arrow-pill up">↗ 4%</span></td></tr>
            <tr><td>Cidade Auto</td><td class="right">R$ 1,33</td><td class="right"><span class="arrow-pill down">↘ 28%</span></td></tr>
            <tr><td>Park Way</td><td class="right">R$ 1,30</td><td class="right"><span class="arrow-pill down">↘ 30%</span></td></tr>
            <tr><td>Madeiro & J.</td><td class="right">R$ 1,28</td><td class="right"><span class="arrow-pill down">↘ 31%</span></td></tr>
            <tr><td>Madeiro Sia</td><td class="right">R$ 1,11</td><td class="right"><span class="arrow-pill down">↘ 40%</span></td></tr>
            <tr><td>Mamute</td><td class="right">R$ 0,99</td><td class="right"><span class="arrow-pill down">↘ 46%</span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  `;

  // Chart Mensal stacked por unidade
  if (chartInstance) chartInstance.destroy();
  const ctxA = document.getElementById('chartA').getContext('2d');
  const labels = Object.keys(MONTHLY_REV_BY_UNIT);
  const datasetsA = UNITS_META.slice().reverse().map(u => ({ label: u.short, data: labels.map(m => MONTHLY_REV_BY_UNIT[m][u.short]||0), backgroundColor: u.color, stack:'ano', type:'bar', borderRadius:2 }));
  datasetsA.push({ label:'Meta R$ 46.410', data: Array(5).fill(46410), type:'line', borderColor:'#6fe6f5', borderWidth:2, pointRadius:0, fill:false });
  chartInstance = new Chart(ctxA, { data:{labels,datasets:datasetsA}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,grid:{display:false},ticks:{color:'#8a9ba8',font:{size:10}}},y:{stacked:true,beginAtZero:true,grid:{color:'rgba(138,155,168,0.08)'},ticks:{color:'#8a9ba8',callback:v=>'R$ '+v.toLocaleString('pt-BR'),font:{size:10}}}}}});
  const lg = document.getElementById('legendA'); lg.innerHTML='';
  UNITS_META.forEach(u => lg.insertAdjacentHTML('beforeend', `<span class="item"><span class="sw" style="background:${u.color}"></span> ${u.short}</span>`));
  lg.insertAdjacentHTML('beforeend', `<span class="item"><span class="ln" style="background:#6fe6f5;"></span> Meta mensal</span>`);

  // Tabela MoM rede
  const tbMom = document.getElementById('tb-mom');
  let prev = null;
  MONTHLY_TOTAL.forEach(m => {
    const tr = document.createElement('tr');
    let varTxt = '—';
    if (prev !== null) { const v = (m.rev - prev) / prev * 100; const cls = v>=0?'up':'down', ar = v>=0?'↗':'↘'; varTxt = `<span class="arrow-pill ${cls}"><span class="ar">${ar}</span> ${Math.abs(v).toFixed(0)}%</span>`; }
    tr.innerHTML = `<td>${m.mes}</td><td class="right">R$ ${m.rev.toLocaleString('pt-BR')}</td><td class="right">${varTxt}</td>`;
    prev = m.rev;
    tbMom.appendChild(tr);
  });

  // Tabela MoM por unidade
  const tbUnitMom = document.getElementById('tb-unit-mom');
  UNITS_META.forEach(u => {
    const tr = document.createElement('tr');
    let cells = `<td>${u.short}</td>`;
    Object.keys(MONTHLY_REV_BY_UNIT).forEach(mes => {
      cells += `<td class="right">R$ ${(MONTHLY_REV_BY_UNIT[mes][u.short]||0).toLocaleString('pt-BR')}</td>`;
    });
    tr.innerHTML = cells;
    tbUnitMom.appendChild(tr);
  });

  // Ranking
  const tbRank = document.getElementById('tb-rank');
  const ranking = UNITS_META.map(u => ({short:u.short, name:u.name, total: Object.keys(MONTHLY_REV_BY_UNIT).reduce((a,m)=>a+(MONTHLY_REV_BY_UNIT[m][u.short]||0),0)})).sort((a,b)=>b.total-a.total);
  ranking.forEach(r => {
    const pct = (r.total/totalAno*100).toFixed(1);
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${r.name}</td><td class="right">R$ ${r.total.toLocaleString('pt-BR')}</td><td class="right">${pct}%</td>`;
    tbRank.appendChild(tr);
  });

  // Chart disp
  const ctxUp = document.getElementById('chartUp').getContext('2d');
  new Chart(ctxUp, { type:'line', data:{labels:['Dez/25','Jan/26','Fev/26','Mar/26','Abr/26'],datasets:[{label:'Disp %',data:[91,88,92,85,88.7],borderColor:'#b5f02a',backgroundColor:'rgba(181,240,42,0.1)',borderWidth:2,pointRadius:4,fill:true,tension:0.3}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#8a9ba8',font:{size:10}}},y:{min:80,max:100,grid:{color:'rgba(138,155,168,0.08)'},ticks:{color:'#8a9ba8',callback:v=>v+'%',font:{size:10}}}}}});
}

// Tab clicks
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    const p = t.dataset.period;
    const lbl = document.getElementById('period-label');
    if (p === 'painel') { lbl.textContent = 'Painel · 25/04/2026 09:30'; renderAlerts(true); renderPainel(); }
    if (p === 'ano')    { lbl.textContent = 'Ano · dez/25 a abr/26 (5 meses)'; renderAlerts(false); renderAno(); }
  });
});

document.addEventListener('click', e => { const h = e.target.closest('.courtesy-head'); if(h){const i=h.closest('.courtesy-item'); if(i)i.classList.toggle('open');} });

renderAlerts(true);
renderPainel();
</script>
</body>
